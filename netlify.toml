[build]
  command = "pnpm install --frozen-lockfile && pnpm build"
  publish = "dist/landing-lab/browser"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

[[forms]]
  name = "contacto-lab-remoto"
  [forms.fields]
    nombre = "text"
    correo = "email"
    telefono = "text"
    institucion = "text"
    tipo = "text"
    mensaje = "text"

[[forms.notifications]]
  name = "Nueva solicitud de laboratorio remoto"
  to = "m16330927@hermosillo.tecnm.mx"
  from = "noreply@labautonomoiaremoto.netlify.app"
  subject = "Nueva solicitud: {{ .Nombre }} de {{ .Institucion }}"
  [forms.notifications.templates]
    html = """
    <h2>Nueva solicitud de laboratorio remoto</h2>
    <p><strong>Nombre:</strong> {{ .Nombre }}</p>
    <p><strong>Email:</strong> {{ .Correo }}</p>
    <p><strong>Teléfono:</strong> {{ .Telefono }}</p>
    <p><strong>Institución:</strong> {{ .Institucion }}</p>
    <p><strong>Tipo:</strong> {{ .Tipo }}</p>
    <p><strong>Mensaje:</strong></p>
    <p>{{ .Mensaje }}</p>
    """
